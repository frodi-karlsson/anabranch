name: Publish JSR

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - id: meta
        run: echo "package=${TAG%%@*}" >> "$GITHUB_OUTPUT"
        env:
          TAG: ${{ inputs.tag }}
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.7.7
      - run: cd packages/${{ steps.meta.outputs.package }} && deno publish
        shell: bash
