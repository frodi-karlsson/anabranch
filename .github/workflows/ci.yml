name: CI

on:
  push:
    branches: [main]
    tags:
      - '*@*'
  pull_request:
  workflow_dispatch:

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - uses: actions/cache@v4
        with:
          path: ~/.cache/deno
          key: deno-${{ hashFiles('deno.lock') }}
          restore-keys: deno-
      - name: Format, lint, test
        run: deno task check
      - name: Coverage summary
        run: deno task coverage

  integration:
    name: Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.7.4
      - uses: actions/cache@v4
        with:
          path: ~/.cache/deno
          key: deno-${{ hashFiles('deno.lock') }}
          restore-keys: deno-
      - name: Integration tests
        run: deno task test:integration

  docs:
    name: Deploy docs
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Generate docs
        run: deno task doc
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

  publish-jsr:
    needs: [check, integration]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/publish-jsr.yml
    with:
      tag: ${{ github.ref_name }}

  publish-npm:
    needs: [check, integration]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/publish-npm.yml
    with:
      tag: ${{ github.ref_name }}

  release-downstream:
    needs: [publish-jsr, publish-npm]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    concurrency:
      group: release-downstream-${{ github.sha }}
      cancel-in-progress: false
    permissions:
      contents: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.7.4
      - name: Collect tags at this commit
        id: tags
        run: |
          TAGS=$(git tag --points-at "${{ github.sha }}" | grep '@' | tr '\n' ' ')
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
          echo "Found tags: $TAGS"
      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Bump downstream packages
        run: |
          deno run -A scripts/bump-downstream.ts ${{ steps.tags.outputs.tags }}
