name: CI

on:
  push:
    branches: [main]
    tags:
      - "anabranch@*"
      - "web-client@*"
      - "broken-link-checker@*"
  pull_request:
  workflow_dispatch:

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Format, lint, test
        run: deno task check
      - name: Coverage summary
        run: deno task coverage

  docs:
    name: Deploy docs
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Generate docs
        run: deno task doc
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

  publish-jsr-anabranch:
    needs: check
    if: startsWith(github.ref, 'refs/tags/anabranch@')
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/publish-jsr.yml
    with:
      package: anabranch

  publish-jsr-web-client:
    needs: check
    if: startsWith(github.ref, 'refs/tags/web-client@')
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/publish-jsr.yml
    with:
      package: web-client

  publish-jsr-broken-link-checker:
    needs: check
    if: startsWith(github.ref, 'refs/tags/broken-link-checker@')
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/publish-jsr.yml
    with:
      package: broken-link-checker

  publish-npm-anabranch:
    needs: check
    if: startsWith(github.ref, 'refs/tags/anabranch@')
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/publish-npm.yml
    with:
      package: anabranch

  publish-npm-web-client:
    needs: check
    if: startsWith(github.ref, 'refs/tags/web-client@')
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/publish-npm.yml
    with:
      package: web-client

  publish-npm-broken-link-checker:
    needs: check
    if: startsWith(github.ref, 'refs/tags/broken-link-checker@')
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/publish-npm.yml
    with:
      package: broken-link-checker
