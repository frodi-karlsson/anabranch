name: CI

on:
  push:
    branches: [main]
    tags:
      - "*@*"
  pull_request:
  workflow_dispatch:

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - uses: actions/cache@v4
        with:
          path: ~/.cache/deno
          key: deno-${{ hashFiles('deno.lock') }}
          restore-keys: deno-
      - name: Format, lint, test
        run: deno task check
      - name: Coverage summary
        run: deno task coverage

  integration:
    name: Integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: mysql
          MYSQL_DATABASE: mysql
        ports:
          - 3307:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - uses: actions/cache@v4
        with:
          path: ~/.cache/deno
          key: deno-${{ hashFiles('deno.lock') }}
          restore-keys: deno-
      - name: Integration tests
        run: deno task test:integration
        env:
          POSTGRES_URL: postgresql://postgres:postgres@localhost:5432/postgres
          MYSQL_URL: mysql://root:mysql@localhost:3307/mysql

  docs:
    name: Deploy docs
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Generate docs
        run: deno task doc
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

  publish-jsr:
    needs: [check, integration]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/publish-jsr.yml
    with:
      tag: ${{ github.ref_name }}

  publish-npm:
    needs: [check, integration]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/publish-npm.yml
    with:
      tag: ${{ github.ref_name }}
