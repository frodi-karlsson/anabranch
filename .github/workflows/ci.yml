name: CI

on:
  push:
    branches: [main]
    tags:
      - "*@*"
  pull_request:
  workflow_dispatch:

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - uses: actions/cache@v4
        with:
          path: ~/.cache/deno
          key: deno-${{ hashFiles('deno.lock') }}
          restore-keys: deno-
      - name: Format, lint, test
        run: deno task check
      - name: Coverage summary
        run: deno task coverage

  integration:
    name: Integration
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: mysql
          MYSQL_DATABASE: mysql
        ports:
          - 3307:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      rabbitmq:
        image: rabbitmq:3-management
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics ping"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 5
      s3:
        image: minio/minio
        env:
          MINIO_ROOT_USER: minioadmin
          MINIO_ROOT_PASSWORD: minioadmin
          MINIO_SERVER_URL: http://localhost:9000
        ports:
          - 9000:9000
          - 9001:9001
        options: >-
          --entrypoint=/bin/sh
          -c "minio server /data --console-address :9001"
      gcs:
        image: fsouza/fake-gcs-server
        ports:
          - 4443:4443
        options: >-
          -scheme http
          -public-host localhost:4443
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - uses: actions/cache@v4
        with:
          path: ~/.cache/deno
          key: deno-${{ hashFiles('deno.lock') }}
          restore-keys: deno-
      - name: Integration tests
        run: deno task test:integration
        env:
          POSTGRES_URL: postgresql://postgres:postgres@localhost:5432/postgres
          MYSQL_URL: mysql://root:mysql@localhost:3307/mysql
          REDIS_URL: redis://localhost:6379
          RABBITMQ_URL: amqp://localhost:5672
          S3_ENDPOINT: http://localhost:9000
          S3_REGION: us-east-1
          S3_ACCESS_KEY_ID: minioadmin
          S3_SECRET_ACCESS_KEY: minioadmin
          S3_BUCKET: test-bucket
          GCS_ENDPOINT: http://localhost:4443
          GCS_PROJECT_ID: test-project
          GCS_BUCKET: test-bucket

  docs:
    name: Deploy docs
    runs-on: ubuntu-latest
    needs: check
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - name: Generate docs
        run: deno task doc
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

  publish-jsr:
    needs: [check, integration]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/publish-jsr.yml
    with:
      tag: ${{ github.ref_name }}

  publish-npm:
    needs: [check, integration]
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/publish-npm.yml
    with:
      tag: ${{ github.ref_name }}
