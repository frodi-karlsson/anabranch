name: Release Downstream

on:
  push:
    tags:
      - '*@*'

jobs:
  # Collect all tags pointing to the same commit as the tag that triggered
  # this run, then wait for all their CI runs to succeed before bumping.
  # Using a concurrency group keyed on the commit SHA means that even if
  # multiple tags from the same commit trigger this workflow in parallel,
  # only one instance proceeds — the rest are cancelled.
  bump-downstream:
    name: Bump downstream packages
    runs-on: ubuntu-latest
    concurrency:
      group: release-downstream-${{ github.sha }}
      cancel-in-progress: false # let the first one win, don't cancel it

    permissions:
      contents: write
      actions: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      # Find all *@* tags pointing to this exact commit. If multiple packages
      # were bumped together (same commit), we get all of them here.
      - name: Collect tags at this commit
        id: tags
        run: |
          TAGS=$(git tag --points-at "${{ github.sha }}" | grep '@' | tr '\n' ' ')
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
          echo "Found tags: $TAGS"

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump downstream packages
        run: |
          deno run -A scripts/bump-downstream.ts ${{ steps.tags.outputs.tags }}
