name: Publish npm

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - id: meta
        run: echo "package=${TAG%%@*}" >> "$GITHUB_OUTPUT"
        env:
          TAG: ${{ inputs.tag }}
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Clear auth token for OIDC
        run: echo "NODE_AUTH_TOKEN=" >> $GITHUB_ENV
        shell: bash
      - name: Update npm
        run: npm install -g npm@latest
        shell: bash
      - name: Build npm package
        run: deno run -A ./scripts/build-npm.ts -p=${{ steps.meta.outputs.package }}
        shell: bash
      - run: cd packages/${{ steps.meta.outputs.package }}/npm && npm publish --access public
        shell: bash
